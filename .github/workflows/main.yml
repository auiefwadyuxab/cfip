name: CF 优选节点极速聚合

on:
  schedule:
    # 每天北京时间零点开始，每半小时自动运行一次。
    # 对应 UTC 时间的 16:00
    - cron: '*/30 * * * *'
  workflow_dispatch: # 允许在 GitHub Action 控制台手动触发任务

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装 Python 运行环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装必要依赖 requests 和 urllib3
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: 启动聚合抓取去重脚本
        env:
          # 从 Github Actions Secrets 动态注入聚合链接
          WILD_SUB_URL: ${{ secrets.WILD_SUB_URL }}
        run: |
          python juhe.py

      - name: 提交并推送到代码仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 跟踪最终生成的去重文件和追加的日志
          git add juhe.txt log.txt
          
          if git diff --cached --quiet; then
            echo "没有发现节点数据和日志发生变更，跳过本次推送。"
          else
            git commit -m "自动更新: 聚合数据及日志更新 [$(date -d '8 hours' +'%Y-%m-%d %H:%M:%S') Beijing]"
            git push origin HEAD:${{ github.ref }}
          fi